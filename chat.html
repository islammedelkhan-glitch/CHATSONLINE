<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-bg: #111b21; --wa-dark: #202c33; --wa-teal: #00a884; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; height: 100%; max-width: 450px; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; }
        .mobile-view { height: 90vh !important; border: 8px solid #333; border-radius: 30px; }

        .header { background: var(--wa-dark); padding: 15px; display: flex; justify-content: flex-end; gap: 20px; align-items: center; }
        .tabs { display: flex; background: var(--wa-dark); border-bottom: 1px solid #222d32; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #8696a0; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab.active { color: var(--wa-teal); border-bottom: 3px solid var(--wa-teal); }

        .content { flex: 1; overflow-y: auto; display: none; }
        .content.active { display: block; }
        .user-item { padding: 15px; border-bottom: 1px solid #1c262d; cursor: pointer; display: flex; align-items: center; gap: 15px; }

        #chat-window { position: absolute; inset: 0; background: #0b141a; display: none; flex-direction: column; z-index: 500; }
        .chat-h { background: var(--wa-dark); padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 14px; }
        .sent { background: #005c4b; align-self: flex-end; }
        .rec { background: #202c33; align-self: flex-start; }

        /* Call UI */
        #call-ui { position: fixed; inset: 0; background: #0b141a; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #remote-v { width: 90%; border-radius: 15px; background: #000; }
    </style>
</head>
<body>

<div id="setup" style="position:fixed; inset:0; background:#0b141a; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h3>Құрылғы:</h3>
    <button onclick="start('pc')" style="padding:15px; margin:10px;">Компьютер</button>
    <button onclick="start('mobile')" style="padding:15px; margin:10px; background:var(--wa-teal); color:white; border:none;">Телефон (16:9)</button>
</div>

<div id="app">
    <div id="call-ui">
        <h2 id="call-info">Звонок...</h2>
        <video id="remote-v" autoplay></video>
        <div style="margin-top:20px; display:flex; gap:30px;">
            <button id="answer-btn" onclick="answerCall()" style="background:green; color:white; border:none; padding:20px; border-radius:50%; display:none;"><i class="fas fa-phone"></i></button>
            <button onclick="location.reload()" style="background:red; color:white; border:none; padding:20px; border-radius:50%;"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-h">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <b id="chat-user-name" style="flex:1">Аты</b>
            <i class="fas fa-video" onclick="initiateCall('video')" style="color:var(--wa-teal); font-size:20px;"></i>
            <i class="fas fa-phone" onclick="initiateCall('audio')" style="margin-left:20px; color:var(--wa-teal); font-size:20px;"></i>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; background:var(--wa-dark); display:flex; gap:10px;">
            <input type="text" id="minp" placeholder="Хабарлама..." style="flex:1; border:none; padding:12px; border-radius:25px; background:#2a3942; color:white;">
            <button onclick="send()" style="background:none; border:none; color:var(--wa-teal); font-size:22px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="header">
        <i class="fas fa-search" onclick="switchTab('chats')"></i>
        <i class="fas fa-ellipsis-v"></i>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('chats', this)">ЧАТТАР</div>
        <div class="tab" onclick="switchTab('status', this)">СТАТУС</div>
        <div class="tab" onclick="switchTab('calls', this)">ҚОҢЫРАУ</div>
    </div>

    <div id="sec-chats" class="content active">
        <div style="padding:10px;"><input type="text" placeholder="Адам іздеу..." onkeyup="searchUsers(this.value)" style="width:90%; padding:10px; border-radius:10px; border:none; background:#202c33; color:white;"></div>
        <div id="chat-list"></div>
    </div>

    <div id="sec-status" class="content">
        <div class="user-item" onclick="document.getElementById('st-input').click()">
            <div style="width:50px; height:50px; border:2px dashed var(--wa-teal); border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-plus"></i></div>
            <div><b>Менің статусым</b><br><small>Статус қосу</small></div>
            <input type="file" id="st-input" hidden onchange="uploadStatus(this)">
        </div>
        <div id="status-list"></div>
    </div>
</div>

<script>
    const socket = io();
    const myName = localStorage.getItem('username');
    let peer, myStream, activeChat = '';

    function start(mode) {
        if(mode === 'mobile') document.getElementById('app').classList.add('mobile-view');
        document.getElementById('setup').style.display = 'none';
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
            myStream = s;
            peer = new Peer(myName); // Peer-ді тек камера рұқсат берген соң қосамыз
            peer.on('call', call => {
                window.incomingCall = call;
                document.getElementById('call-ui').style.display = 'flex';
                document.getElementById('answer-btn').style.display = 'block';
            });
        });
    }

    socket.emit('join', myName);

    function switchTab(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('sec-'+id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'status') loadStatuses();
    }

    async function searchUsers(q) {
        if(!q) return;
        const res = await fetch(`/search?q=${q}`);
        const d = await res.json();
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        d.data.forEach(u => {
            if(u === myName) return;
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `<b>${u}</b>`;
            div.onclick = () => openChat(u);
            list.appendChild(div);
        });
    }

    async function openChat(name) {
        activeChat = name;
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        const res = await fetch(`/messages?me=${myName}&with=${name}`);
        const msgs = await res.json();
        const box = document.getElementById('msgs');
        box.innerHTML = '';
        msgs.forEach(m => addMsg(m));
    }

    function addMsg(d) {
        const div = document.createElement('div');
        div.className = `msg ${d.from === myName ? 'sent' : 'rec'}`;
        div.innerText = d.text;
        document.getElementById('msgs').appendChild(div);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    socket.on('msg', d => { if(d.from === activeChat || d.from === myName) addMsg(d); });

    function send() {
        const i = document.getElementById('minp');
        if(i.value && activeChat) {
            socket.emit('msg', {to:activeChat, from:myName, text:i.value});
            i.value = '';
        }
    }

    // ЗВОНОК ФУНКЦИЯСЫ
    function initiateCall(type) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('call-info').innerText = activeChat + " звондау...";
        // Сигнал жіберу
        socket.emit('call-user', {to:activeChat, from:myName, type:type});
        
        const call = peer.call(activeChat, myStream);
        call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
    }

    socket.on('incoming-call', d => {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('call-info').innerText = d.from + " звондауда...";
        document.getElementById('answer-btn').style.display = 'block';
    });

    function answerCall() {
        window.incomingCall.answer(myStream);
        window.incomingCall.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
        document.getElementById('answer-btn').style.display = 'none';
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    async function uploadStatus(inp) {
        const fd = new FormData();
        fd.append('file', inp.files[0]);
        fd.append('user', myName);
        await fetch('/upload-status', {method:'POST', body:fd});
        loadStatuses();
    }

    async function loadStatuses() {
        const res = await fetch('/statuses');
        const data = await res.json();
        const list = document.getElementById('status-list');
        list.innerHTML = '';
        data.forEach(s => {
            list.innerHTML += `<div class="user-item" onclick="window.open('${s.file}')">
                <div style="width:50px; height:50px; border:2px solid var(--wa-teal); border-radius:50%; overflow:hidden;"><img src="${s.file}" width="100%"></div>
                <div><b>${s.user}</b><br><small>${new Date(s.time).toLocaleTimeString()}</small></div>
            </div>`;
        });
    }
</script>
</body>
</html>
