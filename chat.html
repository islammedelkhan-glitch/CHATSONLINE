<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #0b141a; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 450px; background: #111b21; display: flex; flex-direction: column; position: relative; border: 1px solid #222; }
        .header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; color: #8696a0; }
        .tab-bar { display: flex; background: #202c33; border-bottom: 1px solid #222d32; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #8696a0; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab.active { color: #00a884; border-bottom: 3px solid #00a884; }
        
        /* Поисковик стилі */
        #search-box { display: none; padding: 10px; background: #111b21; }
        #search-box input { width: 90%; padding: 10px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        
        #list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c262d; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #6a7175; display: flex; align-items: center; justify-content: center; color: white; }

        #chat-ui { position: absolute; inset: 0; background: #0b141a; display: none; flex-direction: column; z-index: 100; }
        .chat-h { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; }
        .sent { background: #005c4b; align-self: flex-end; }
        .rec { background: #202c33; align-self: flex-start; }
    </style>
</head>
<body>

<div id="app">
    <div id="search-box">
        <input type="text" id="sq" placeholder="Адам іздеу..." onkeyup="doSearch(this.value)">
        <i class="fas fa-times" onclick="toggleSearch()" style="cursor:pointer"></i>
    </div>

    <div class="header">
        <b style="font-size: 22px; color: white;">WhatsApp</b>
        <div>
            <i class="fas fa-search" onclick="toggleSearch()" style="margin-right: 20px; cursor: pointer;"></i>
            <i class="fas fa-ellipsis-v" onclick="showMenu()" style="cursor: pointer;"></i>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active">ЧАТТАР</div>
        <div class="tab">СТАТУС</div>
        <div class="tab">ҚОҢЫРАУ</div>
    </div>

    <div id="list"></div>

    <div id="chat-ui">
        <div class="chat-h">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <div class="avatar"><i class="fas fa-user"></i></div>
            <b id="active-user">Аты</b>
        </div>
        <div id="msgs"></div>
        <div style="padding: 10px; background: #202c33; display: flex; gap: 10px;">
            <input type="text" id="minp" style="flex: 1; border: none; padding: 10px; border-radius: 20px; background: #2a3942; color: white;">
            <button onclick="send()" style="background: none; border: none; color: #00a884; font-size: 20px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const myName = localStorage.getItem('username');
    if(!myName) location.href = 'index.html'; // Егер логин жасамаса, кіргізбейді

    let active = '';
    socket.emit('join', myName);

    function toggleSearch() {
        const box = document.getElementById('search-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function doSearch(q) {
        if(!q) return;
        const res = await fetch(`/search?q=${q}`);
        const data = await res.json();
        const cont = document.getElementById('list');
        cont.innerHTML = '';
        data.data.forEach(name => {
            if(name === myName) return;
            const d = document.createElement('div');
            d.className = 'user-item';
            d.innerHTML = `<div class="avatar"><i class="fas fa-user"></i></div><b>${name}</b>`;
            d.onclick = () => openChat(name);
            cont.appendChild(d);
        });
    }

    async function openChat(name) {
        active = name;
        document.getElementById('active-user').innerText = name;
        document.getElementById('chat-ui').style.display = 'flex';
        const res = await fetch(`/messages?me=${myName}&with=${name}`);
        const msgs = await res.json();
        const box = document.getElementById('msgs');
        box.innerHTML = '';
        msgs.forEach(m => addBubble(m));
    }

    function addBubble(d) {
        const div = document.createElement('div');
        div.className = `msg ${d.from === myName ? 'sent' : 'rec'}`;
        div.innerText = d.text;
        document.getElementById('msgs').appendChild(div);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    socket.on('msg', d => { if(d.from === active || d.from === myName) addBubble(d); });

    function send() {
        const i = document.getElementById('minp');
        if(i.value && active) {
            socket.emit('msg', {to: active, from: myName, text: i.value});
            i.value = '';
        }
    }

    function closeChat() { document.getElementById('chat-ui').style.display = 'none'; }
    function showMenu() { alert("Параметрлер жақында қосылады!"); }
</script>
</body>
</html>
