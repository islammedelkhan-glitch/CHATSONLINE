<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #008069; --wa-bg: #111b21; --wa-dark: #202c33; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #app { width: 100%; height: 100%; max-width: 450px; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .mobile-mode { height: 90vh !important; border: 10px solid #333; border-radius: 30px; aspect-ratio: 9/16; }

        .header { background: var(--wa-dark); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .tabs { display: flex; background: var(--wa-dark); border-bottom: 1px solid #222d32; }
        .tab { flex: 1; padding: 15px; text-align: center; color: #8696a0; cursor: pointer; font-size: 13px; font-weight: bold; }
        .tab.active { color: #00a884; border-bottom: 3px solid #00a884; }

        .content { flex: 1; overflow-y: auto; display: none; }
        .content.active { display: block; }
        .item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c262d; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #3b4a54; display: flex; align-items: center; justify-content: center; }

        /* Чат терезесі */
        #chat-ui { position: absolute; inset: 0; background: #0b141a; display: none; flex-direction: column; z-index: 100; }
        .chat-h { background: var(--wa-dark); padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 14px; }
        .sent { background: #005c4b; align-self: flex-end; }
        .rec { background: #202c33; align-self: flex-start; }

        /* Звонок UI */
        #call-ui { position: fixed; inset: 0; background: #0b141a; display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        video { width: 90%; border-radius: 15px; background: #000; margin-top: 20px; }
    </style>
</head>
<body>

<div id="device-select" style="position:fixed; inset:0; background:#0b141a; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h3>Құрылғыны таңдаңыз</h3>
    <button onclick="initApp('pc')" style="padding:15px 30px; margin:10px; background:var(--wa-dark); color:white; border:none; border-radius:10px;">Компьютер</button>
    <button onclick="initApp('mobile')" style="padding:15px 30px; margin:10px; background:#00a884; color:white; border:none; border-radius:10px;">Телефон (16:9)</button>
</div>

<div id="app">
    <div id="call-ui">
        <h2 id="call-name">Қоңырау келуде...</h2>
        <video id="remote-v" autoplay></video>
        <div style="margin-top:20px; display:flex; gap:20px;">
            <button id="accept-btn" onclick="accept()" style="background:green; color:white; border:none; padding:15px; border-radius:50%;"><i class="fas fa-phone"></i></button>
            <button onclick="location.reload()" style="background:red; color:white; border:none; padding:15px; border-radius:50%;"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div class="header">
        <b style="font-size:20px; color:#8696a0">WhatsApp</b>
        <div><i class="fas fa-search" onclick="switchTab('chats')"></i><i class="fas fa-ellipsis-v" style="margin-left:20px;"></i></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('chats', this)">ЧАТТАР</div>
        <div class="tab" onclick="switchTab('status', this)">СТАТУС</div>
        <div class="tab" onclick="switchTab('calls', this)">ҚОҢЫРАУ</div>
    </div>

    <div id="sec-chats" class="content active">
        <div style="padding:10px;"><input type="text" placeholder="Адам іздеу..." onkeyup="doSearch(this.value)" style="width:90%; padding:10px; background:var(--wa-dark); border:none; color:white; border-radius:10px;"></div>
        <div id="user-list"></div>
    </div>

    <div id="sec-status" class="content">
        <div class="item" onclick="document.getElementById('st-file').click()">
            <div class="avatar" style="border:2px dashed #00a884"><i class="fas fa-plus"></i></div>
            <div><b>Менің статусым</b><br><small>Статус жүктеу</small></div>
            <input type="file" id="st-file" hidden onchange="uploadStatus(this)">
        </div>
        <div id="status-list"></div>
    </div>

    <div id="sec-calls" class="content">
        <div id="call-list"></div>
    </div>

    <div id="chat-ui">
        <div class="chat-h">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <div class="avatar"><i class="fas fa-user"></i></div>
            <b id="active-user" style="flex:1">Аты</b>
            <i class="fas fa-video" onclick="makeCall('video')"></i>
            <i class="fas fa-phone" onclick="makeCall('audio')" style="margin-left:15px;"></i>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; background:var(--wa-dark); display:flex; gap:10px;">
            <input type="text" id="minp" placeholder="Хабарлама..." style="flex:1; padding:10px; border-radius:20px; border:none; background:#2a3942; color:white;">
            <button onclick="sendMsg()" style="background:none; border:none; color:#00a884; font-size:22px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const myName = localStorage.getItem('username');
    let activeChat = '', myStream, peer = new Peer(myName), incoming;

    function initApp(mode) {
        if(mode === 'mobile') document.getElementById('app').classList.add('mobile-mode');
        document.getElementById('device-select').style.display = 'none';
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => myStream = s);
    }

    socket.emit('join', myName);

    function switchTab(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('sec-'+id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'status') loadStatus();
        if(id === 'calls') loadCalls();
    }

    async function doSearch(q) {
        if(!q) return;
        const res = await fetch(`/search?q=${q}`);
        const d = await res.json();
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        d.data.forEach(u => {
            if(u === myName) return;
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<div class="avatar"><i class="fas fa-user"></i></div><b>${u}</b>`;
            div.onclick = () => openChat(u);
            list.appendChild(div);
        });
    }

    async function openChat(name) {
        activeChat = name;
        document.getElementById('active-user').innerText = name;
        document.getElementById('chat-ui').style.display = 'flex';
        const res = await fetch(`/messages?me=${myName}&with=${name}`);
        const data = await res.json();
        const box = document.getElementById('msgs');
        box.innerHTML = '';
        data.forEach(m => addBubble(m));
    }

    function addBubble(d) {
        const div = document.createElement('div');
        div.className = `msg ${d.from === myName ? 'sent' : 'rec'}`;
        div.innerText = d.text;
        document.getElementById('msgs').appendChild(div);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    socket.on('msg', d => { if(d.from === activeChat || d.from === myName) addBubble(d); });

    function sendMsg() {
        const i = document.getElementById('minp');
        if(i.value && activeChat) {
            socket.emit('msg', {to:activeChat, from:myName, text:i.value});
            i.value = '';
        }
    }

    function closeChat() { document.getElementById('chat-ui').style.display = 'none'; }

    // ЗВОНОКТАР
    function makeCall(type) {
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('call-name').innerText = activeChat + " звондау...";
        const call = peer.call(activeChat, myStream);
        call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
        socket.emit('save-call', {from:myName, to:activeChat, type:type});
    }

    peer.on('call', call => {
        incoming = call;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('call-name').innerText = call.peer + " звондауда...";
        document.getElementById('accept-btn').style.display = 'block';
    });

    function accept() {
        incoming.answer(myStream);
        incoming.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
    }

    // СТАТУС ЖҮКТЕУ
    async function uploadStatus(inp) {
        const fd = new FormData();
        fd.append('file', inp.files[0]);
        fd.append('user', myName);
        await fetch('/upload-status', {method:'POST', body:fd});
        loadStatus();
    }

    async function loadStatus() {
        const res = await fetch('/statuses');
        const data = await res.json();
        const list = document.getElementById('status-list');
        list.innerHTML = '';
        data.forEach(s => {
            list.innerHTML += `<div class="item" onclick="window.open('${s.file}')">
                <div class="avatar" style="border:2px solid #00a884"><img src="${s.file}" width="100%" style="border-radius:50%"></div>
                <div><b>${s.user}</b><br><small>${new Date(s.time).toLocaleTimeString()}</small></div>
            </div>`;
        });
    }

    async function loadCalls() {
        const res = await fetch(`/call-history?me=${myName}`);
        const data = await res.json();
        const list = document.getElementById('call-list');
        list.innerHTML = '';
        data.forEach(c => {
            list.innerHTML += `<div class="item"><i class="fas fa-phone"></i><div><b>${c.from === myName ? c.to : c.from}</b><br><small>${new Date(c.time).toLocaleString()}</small></div></div>`;
        });
    }
</script>
</body>
</html>
