<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Messenger Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-bg: #0b141a; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 7-себеп: 16:9 Телефон режимі */
        #app-container { width: 100%; height: 100%; background: var(--main-bg); display: flex; flex-direction: column; transition: 0.3s; }
        .mobile-view { width: 380px !important; height: 90vh !important; border: 8px solid #222; border-radius: 30px; }

        /* Выкладкалар */
        .content-section { flex: 1; display: none; overflow-y: auto; padding-bottom: 70px; }
        .active-section { display: flex; flex-direction: column; }
        
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 65px; background: #111b21; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222d32; }
        .nav-item { text-align: center; color: #8696a0; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: #00a884; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Звонок Хабарламасы */
        #call-ui { display: none; position: fixed; inset: 0; background: rgba(11, 20, 26, 0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 75%; font-size: 14px; }
        .sent { background: #005c4b; align-self: flex-end; }
        .rec { background: #202c33; align-self: flex-start; }
    </style>
</head>
<body>

<div id="device-overlay" style="position:fixed; inset:0; background:#0b141a; z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h3>Құрылғыны таңдаңыз:</h3>
    <button onclick="setDevice('pc')" style="padding:15px 30px; margin:10px; border-radius:10px; border:none; background:#202c33; color:white;">💻 Компьютер</button>
    <button onclick="setDevice('mobile')" style="padding:15px 30px; margin:10px; border-radius:10px; border:none; background:#00a884; color:white;">📱 Телефон (16:9)</button>
</div>

<div id="call-ui">
    <h2 id="caller-info">Кіріс қоңырауы...</h2>
    <div style="display:flex; gap:30px;">
        <button onclick="acceptCall()" style="background:#00a884; width:60px; height:60px; border-radius:50%; border:none; color:white;"><i class="fas fa-phone"></i></button>
        <button onclick="location.reload()" style="background:#f44336; width:60px; height:60px; border-radius:50%; border:none; color:white;"><i class="fas fa-phone-slash"></i></button>
    </div>
    <video id="remote-v" autoplay style="width:80%; margin-top:20px; border-radius:15px;"></video>
</div>

<div id="app-container">
    <div id="section-chats" class="content-section active-section">
        <div style="padding:15px; background:#202c33; display:flex; justify-content:space-between;">
            <b>Чаттар</b>
            <span id="active-with" style="color:#00a884"></span>
        </div>
        <div id="msgs"></div>
        <div id="chat-controls" style="padding:10px; display:none; background:#202c33; gap:10px;">
            <input type="text" id="inp" style="flex:1; border:none; padding:10px; border-radius:20px; background:#2a3942; color:white;">
            <button onclick="send()" style="background:none; border:none; color:#00a884; font-size:20px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="section-search" class="content-section">
        <div style="padding:15px;"><input type="text" placeholder="Адам іздеу..." onkeyup="doSearch(this.value)" style="width:100%; padding:12px; border-radius:10px; border:none; background:#2a3942; color:white;"></div>
        <div id="search-results"></div>
    </div>

    <div id="section-status" class="content-section">
        <div style="padding:20px; text-align:center;"><h3>Стористер</h3><p style="color:#8696a0">Әзірге стористер жоқ</p></div>
    </div>

    <div id="section-calls" class="content-section">
        <div style="padding:15px;"><b>Звоноктар тарихы</b></div>
        <div id="call-history"></div>
    </div>

    <div id="section-settings" class="content-section">
        <div style="padding:20px; text-align:center;">
            <div style="width:80px; height:80px; background:#2a3942; border-radius:50%; margin: 0 auto 10px;"></div>
            <h3 id="profile-name"></h3>
            <hr style="border:0.5px solid #222">
            <p>Тема таңдау:</p>
            <input type="color" onchange="setTheme(this.value)" style="width:100px; height:40px;">
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showSection('chats')"><i class="fas fa-comment"></i>Чаттар</div>
        <div class="nav-item" onclick="showSection('search')"><i class="fas fa-search"></i>Іздеу</div>
        <div class="nav-item" onclick="showSection('status')"><i class="fas fa-circle-notch"></i>Стористер</div>
        <div class="nav-item" onclick="showSection('calls')"><i class="fas fa-phone-alt"></i>Звоноктар</div>
        <div class="nav-item" onclick="showSection('settings')"><i class="fas fa-user"></i>Аккаунт</div>
    </div>
</div>

<script>
    const socket = io();
    const myName = localStorage.getItem('username');
    document.getElementById('profile-name').innerText = myName;
    let active = '', myStream, peer = new Peer(myName), incomingCall;

    function setDevice(type) {
        if(type === 'mobile') document.getElementById('app-container').classList.add('mobile-view');
        document.getElementById('device-overlay').style.display = 'none';
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => myStream = s);
    }

    socket.emit('join', myName);

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('section-' + id).classList.add('active-section');
        event.currentTarget.classList.add('active');
        if(id === 'calls') loadCalls();
    }

    async function doSearch(q) {
        if(!q) return;
        const res = await fetch(`/search?q=${q}`);
        const data = await res.json();
        const cont = document.getElementById('search-results');
        cont.innerHTML = '';
        data.data.forEach(name => {
            const d = document.createElement('div');
            d.style.padding = '15px'; d.style.borderBottom = '1px solid #222';
            d.innerHTML = `<b>${name}</b>`;
            d.onclick = () => { active = name; openChat(name); };
            cont.appendChild(d);
        });
    }

    async function openChat(name) {
        active = name;
        document.getElementById('active-with').innerText = name;
        document.getElementById('chat-controls').style.display = 'flex';
        showSection('chats');
        const res = await fetch(`/messages?me=${myName}&with=${name}`);
        const data = await res.json();
        const box = document.getElementById('msgs');
        box.innerHTML = '';
        data.forEach(m => addBubble(m));
    }

    function addBubble(d) {
        const div = document.createElement('div');
        div.className = `bubble ${d.from === myName ? 'sent' : 'rec'}`;
        div.innerText = d.text;
        document.getElementById('msgs').appendChild(div);
        document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }

    socket.on('msg', d => { if(d.from === active || d.from === myName) addBubble(d); });

    peer.on('call', call => {
        incomingCall = call;
        document.getElementById('call-ui').style.display = 'flex';
        document.getElementById('caller-info').innerText = "Кіріс қоңырауы: " + call.peer;
    });

    function acceptCall() {
        incomingCall.answer(myStream);
        incomingCall.on('stream', rs => { document.getElementById('remote-v').srcObject = rs; });
    }

    async function loadCalls() {
        const res = await fetch(`/calls?me=${myName}`);
        const data = await res.json();
        const cont = document.getElementById('call-history');
        cont.innerHTML = data.map(c => `<div style="padding:10px; border-bottom:1px solid #222">${c.from} -> ${c.to} (${new Date(c.time).toLocaleTimeString()})</div>`).join('');
    }

    function send() {
        const i = document.getElementById('inp');
        if(i.value && active) { socket.emit('msg', {to:active, from:myName, text:i.value}); i.value = ''; }
    }

    function setTheme(c) { document.documentElement.style.setProperty('--main-bg', c); }
</script>
</body>
</html>
